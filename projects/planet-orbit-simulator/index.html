<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Planet Orbit Simulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🪐 Planet Orbit Simulator</h1>

<div class="controls">
<label>Orbit Speed</label>
<input type="range" id="speed" min="0.2" max="3" step="0.1" value="1">

<button id="pause">Pause</button>
<button id="restart">Restart</button>
</div>

<canvas id="space" width="600" height="400"></canvas>

<p class="hint">
Watch planets orbit around the star and control the simulation speed.
</p>

<script src="script.js"></script>

</body>
</html>
