<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Typing Dodge Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>⌨️ Typing Dodge</h1>

<div class="hud">
Score: <span id="score">0</span>
Combo: <span id="combo">1x</span>
<button id="restart">Restart</button>
</div>

<div id="game"></div>

<input id="typing" placeholder="Type words to destroy them..." autofocus>

<p class="hint">
Move with A/D or Arrow keys. Type the falling words to destroy them.
</p>

<script src="script.js"></script>

</body>
</html>
