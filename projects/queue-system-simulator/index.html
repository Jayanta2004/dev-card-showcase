<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Queue System Simulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🧾 Queue System Simulator</h1>

<div class="controls">
<button id="newTicket">Generate Ticket</button>
<button id="serveNext">Serve Next</button>
<button id="reset">Reset</button>
</div>

<div class="dashboard">

<div class="queue-box">
<h3>Waiting Queue</h3>
<ul id="queueList"></ul>
</div>

<div class="stats">
<p>Current Serving: <span id="current">None</span></p>
<p>Total Served: <span id="served">0</span></p>
<p>Average Wait: <span id="avg">0</span> sec</p>
</div>

</div>

</body>
<script src="script.js"></script>
</html>
