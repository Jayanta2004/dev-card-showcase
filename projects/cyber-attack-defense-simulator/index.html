<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Cyber Attack & Defense Simulator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Cybersecurity Attack & Defense Simulator</h1>

<div class="container">

<div class="panel">

<h2>Attack</h2>

<select id="attackSelect">

<option value="sql">SQL Injection</option>
<option value="ddos">DDoS Attack</option>
<option value="bruteforce">Brute Force</option>
<option value="phishing">Phishing</option>

</select>

</div>

<div class="panel">

<h2>Defense</h2>

<select id="defenseSelect">

<option value="firewall">Firewall</option>
<option value="validation">Input Validation</option>
<option value="ratelimit">Rate Limiter</option>
<option value="mfa">Multi-Factor Auth</option>

</select>

</div>

</div>

<button id="simulateBtn">Simulate Attack</button>

<div id="result"></div>

<script src="script.js"></script>

</body>
</html>
