<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>List Item</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>List Item</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="queue.html">Request Queue</a>
            <a href="pickup.html">Pickup Coordination</a>
            <a href="dashboard.html">Sustainability Dashboard</a>
        </nav>
    </header>
    <main>
        <section>
            <form id="listForm">
                <label>Item Type:
                    <select name="type" required>
                        <option value="Clothes">Clothes</option>
                        <option value="Books">Books</option>
                        <option value="Study Essentials">Study Essentials</option>
                        <option value="Other">Other</option>
                    </select>
                </label><br>
                <label>Condition:
                    <select name="condition" required>
                        <option value="New">New</option>
                        <option value="Good">Good</option>
                        <option value="Used">Used</option>
                    </select>
                </label><br>
                <label>Size: <input type="text" name="size"></label><br>
                <label>Description:<br>
                    <textarea name="desc" rows="2"></textarea>
                </label><br>
                <button type="submit">List Item</button>
            </form>
            <div id="itemList"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Second Chance Closet</p>
    </footer>
    <script src="list.js"></script>
</body>
</html>
